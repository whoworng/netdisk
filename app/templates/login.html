{% extends "base.html" %}
{% block title %}登录 - NetDisk{% endblock %}
{% block content %}
<div class="auth-form">
    <h2>登录</h2>
    <form method="POST">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn">登录</button>
    </form>
    <p class="auth-link">没有账号？<a href="{{ url_for('auth.register') }}">去注册</a></p>
</div>
{% endblock %}
