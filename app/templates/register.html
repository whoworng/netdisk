{% extends "base.html" %}
{% block title %}注册 - NetDisk{% endblock %}
{% block content %}
<div class="auth-form">
    <h2>注册</h2>
    <form method="POST">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label>密码（至少 6 位）</label>
            <input type="password" name="password" required minlength="6">
        </div>
        <button type="submit" class="btn">注册</button>
    </form>
    <p class="auth-link">已有账号？<a href="{{ url_for('auth.login') }}">去登录</a></p>
</div>
{% endblock %}
