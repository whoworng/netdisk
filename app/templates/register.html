{% extends "base.html" %}
{% block title %}注册 - NetDisk{% endblock %}
{% block content %}
<div class="auth-card">
    <h2>开启您的云盘</h2>
    <form method="POST">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required autofocus placeholder="请设置用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required minlength="6" placeholder="至少 6 位密码">
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">
            <i data-lucide="user-plus"></i> 注册
        </button>
    </form>
    <p class="auth-link">已有账号？<a href="{{ url_for('auth.login') }}">前往登录</a></p>
</div>
{% endblock %}
