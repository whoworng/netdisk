{% extends "base.html" %}
{% block title %}注册 - NetDisk{% endblock %}
{% block content %}
<div class="nd-auth-page">
    <div class="nd-auth-card">
        <div class="nd-auth-brand">
            <i class="bi bi-cloud-fill"></i>
            <h1>NetDisk</h1>
        </div>
        <h2>创建账号</h2>
        <form method="POST">
            <div class="nd-form-group">
                <label class="nd-label">用户名</label>
                <input type="text" name="username" class="nd-input" required autofocus placeholder="请设置用户名">
            </div>
            <div class="nd-form-group">
                <label class="nd-label">密码</label>
                <input type="password" name="password" class="nd-input" required minlength="6" placeholder="至少 6 位密码">
            </div>
            <button type="submit" class="nd-btn nd-btn-primary nd-btn-full">
                <i class="bi bi-person-plus"></i> 注册
            </button>
        </form>
        <p class="nd-auth-link">已有账号？<a href="{{ url_for('auth.login') }}">前往登录</a></p>
    </div>
</div>
{% endblock %}
