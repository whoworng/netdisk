# 加载动态模块 (必须放在最顶部)
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;
load_module modules/ngx_http_zstd_filter_module.so;
load_module modules/ngx_http_zstd_static_module.so;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # 解除上传文件大小限制 (设置为 0 表示不限制，或者设为 100M)
    client_max_body_size 100M;

    # 自定义日志格式
    log_format main '$remote_addr - [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    # --- 基础性能优化 ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # --- 统一压缩配置 (用于算法对比) ---
    
    # 1. Gzip 配置 (对照组)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml image/svg+xml;

    # 2. Brotli 配置
    brotli on;
    brotli_comp_level 6;
    brotli_static on;
    brotli_min_length 256;
    brotli_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml image/svg+xml;

    # 3. Zstd 配置
    zstd on;
    zstd_comp_level 3;
    zstd_static on;
    zstd_min_length 256;
    zstd_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml image/svg+xml;

    # 输出到标准输出、错误
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    server {
        listen 80;
        server_name linux.gv.uy;

        absolute_redirect off;
        port_in_redirect off;

        location / {
           proxy_pass http://netdisk_app:5000;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
           proxy_set_header X-Forwarded-Proto $scheme;

           proxy_connect_timeout 5s;
           proxy_send_timeout 10s;
           proxy_read_timeout 10s;
        }

        # 静态资源优化
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
            gzip_static on; 
        }

        # 健康检查
        location = /health {
            access_log off;
            return 200 "ok";
        }
    }
}
