# 日志格式学习专用配置
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type text/plain;

    # 自定义日志格式
    log_format main '$remote_addr - [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /home/liujixiang/devops/make/nginx/logs/access.log main;
    error_log /home/liujixiang/devops/make/nginx/logs/error.log;

    server {
        listen 8080;
        server_name localhost;

        location / {
            root /home/liujixiang/devops/make/nginx/html;
            index index.html;
        }

        # 静态资源：关闭日志，减少磁盘写入
        location ~* \.(jpg|png|css|js|ico)$ {
            root /home/liujixiang/devops/make/nginx/html;
            access_log off;
        }

        # 健康检查：也关闭日志，否则每几秒写一条，全是垃圾
        location = /health {
            access_log off;
            return 200 "ok";
        }
    }
}
